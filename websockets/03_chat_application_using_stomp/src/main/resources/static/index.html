<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Chat Application Using STOMP</title>

    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>

    <style>

        body{
            font-family: Arial;
            margin:40px;
        }

        #messages{
            border:1px solid gray;
            height:300px;
            overflow-y:auto;
            padding:10px;
            margin-bottom:10px;
        }

        input{
            padding:8px;
        }

        button{
            padding:8px 16px;
        }

    </style>

</head>

<body>

<h2>Chat Application Using STOMP</h2>

<div id="messages"></div>

<input
        id="message"
        type="text"
        placeholder="Enter message"
        style="width:300px;"
/>

<button onclick="sendMessage()">
    Send
</button>

<script>

    const username = prompt("Enter Username");

    const client = new StompJs.Client({

        brokerURL: "ws://localhost:8080/chat",

        reconnectDelay: 5000,

        debug: str => console.log(str)

    });

    client.onConnect = () => {

        console.log("Connected");

        client.subscribe("/topic/messages", response => {

            const chat = JSON.parse(response.body);

            document.getElementById("messages").innerHTML +=
                `<p><b>${chat.username}</b> : ${chat.content}</p>`;

        });

    };

    client.activate();

    function sendMessage() {

        const input = document.getElementById("message");

        if(input.value.trim() === "")
            return;

        client.publish({

            destination: "/app/message",

            body: JSON.stringify({

                username: username,

                content: input.value

            })

        });

        input.value = "";

    }

</script>

</body>

</html>
